<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinSight — 명세서 분석</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  :root {
    --app: #0b0c0e;
    --panel: #141619;
    --panel-2: #1c1f23;
    --border: #25282d;
    --border-2: #34383f;
    --text: #e9eaec;
    --muted: #9aa0a8;
    --faint: #6a7078;
    --bar: #2a2e34;
    --accent: #3ecf8e;
    --accent-dim: color-mix(in oklab, var(--accent) 14%, var(--panel));
    --accent-border: color-mix(in oklab, var(--accent) 38%, transparent);
    --font: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--app);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "tnum";
  }
  #root { min-height: 100vh; }
  ::selection { background: var(--accent-border); }
  /* 스크롤바 */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 6px; border: 2px solid var(--app); }
  ::-webkit-scrollbar-thumb:hover { background: #444a52; }
  button { font-family: inherit; }
  .pulse { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }
  @keyframes pop { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  input::placeholder { color: var(--faint); }
</style>
</head>
<body>
<div id="root"></div>
